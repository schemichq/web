name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # manual full redeploy of all apps + worker

# Never cancel an in-flight deploy; queue instead.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.set.outputs.apps }} # JSON array of app names to deploy
      worker: ${{ steps.set.outputs.worker }} # "true"/"false"
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # Shared packages feed all 3 apps, so a packages/** change redeploys all.
          filters: |
            shared: &shared
              - 'packages/**'
              - 'bun.lock'
              - 'biome.json'
            schemic: [ *shared, 'apps/schemic/**' ]
            surreal: [ *shared, 'apps/surreal/**' ]
            postgres: [ *shared, 'apps/postgres/**' ]
            worker: [ 'workers/github-stars/**' ]
      - id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo 'apps=["schemic","surreal","postgres"]' >> "$GITHUB_OUTPUT"
            echo 'worker=true' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          apps=()
          [ "${{ steps.filter.outputs.schemic }}" = "true" ] && apps+=("schemic")
          [ "${{ steps.filter.outputs.surreal }}" = "true" ] && apps+=("surreal")
          [ "${{ steps.filter.outputs.postgres }}" = "true" ] && apps+=("postgres")
          if [ ${#apps[@]} -eq 0 ]; then
            echo 'apps=[]' >> "$GITHUB_OUTPUT"
          else
            echo "apps=$(printf '%s\n' "${apps[@]}" | jq -R . | jq -cs .)" >> "$GITHUB_OUTPUT"
          fi
          echo "worker=${{ steps.filter.outputs.worker }}" >> "$GITHUB_OUTPUT"

  deploy-apps:
    name: Deploy ${{ matrix.app }}
    needs: changes
    if: needs.changes.outputs.apps != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.changes.outputs.apps) }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run --cwd apps/${{ matrix.app }} build
      # Deploy with bun's wrangler (not cloudflare/wrangler-action, which shells
      # out to npm and can't parse the apps' `workspace:*` deps). This only
      # uploads the prebuilt ./dist per wrangler.jsonc — no app deps needed.
      - name: Deploy ${{ matrix.app }}
        working-directory: apps/${{ matrix.app }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler@4 deploy

  deploy-worker:
    name: Deploy github-stars
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # wrangler bundles the TypeScript worker; no separate build step needed.
      - name: Deploy github-stars
        working-directory: workers/github-stars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler@4 deploy
